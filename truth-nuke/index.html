<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truth Nuke</title>
    <link rel="stylesheet" href="../sketch-style.css" />
    <style>
      #nuke-btn {
        margin-top: 1rem;
        font-family: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #fff;
        background: #ed225d;
        border: none;
        border-radius: 8px;
        padding: 0.7rem 1.6rem;
        cursor: pointer;
        box-shadow: 0 4px 0 #8c1238;
        transition: transform 0.06s, box-shadow 0.06s;
      }
      #nuke-btn:hover {
        background: #ff2e6b;
      }
      #nuke-btn:active {
        transform: translateY(3px);
        box-shadow: 0 1px 0 #8c1238;
      }
    </style>
    <script src="../p5/p5.min.js"></script>
    <script src="../p5/addons/p5.sound.min.js"></script>
    <script src="sketch.js"></script>
  </head>

  <body>
    <h3 id="back-to-main-page">
      <a href="../index.html">◄ Back to Navigation</a>
    </h3>
    <main></main>
  </body>
